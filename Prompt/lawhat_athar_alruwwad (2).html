<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة أثر الرواد — شبكة الرواد الإلكترونية (الإصدار الشامل)</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap');

:root {
  --navy: #1a2a47; 
  --navy-2: #111d33; 
  --teal: #238b9e; 
  --gold: #d4af37; 
  --purple: #7a50a1;
  --green: #2a8b3d; 
  --red: #d32f2f; 
  --orange: #d16b24; 
  --ink: #1f2937; 
  --muted: #6b7280; 
  --line: #e5e7eb;
  --bg: #f3f4f6; 
  --card: #ffffff;
  
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --radius: 12px;
  --radius-lg: 16px;
  
  --dig: #238b9e; --sci: #2a8b3d; --vol: #7a50a1; --lead: #d16b24;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'IBM Plex Sans Arabic', Tahoma, sans-serif; 
  background: var(--bg); 
  color: var(--ink);
  line-height: 1.6; 
  min-height: 100vh;
  padding-bottom: 40px;
}

/* Header & Nav */
header.top {
  background: linear-gradient(135deg, var(--navy), var(--navy-2)); 
  color: #fff; 
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  box-shadow: var(--shadow); position: sticky; top: 0; z-index: 50;
}
.brand { display: flex; align-items: center; gap: 16px; }
.brand .mark {
  width: 48px; height: 48px; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--gold), #f3ce56);
  display: flex; align-items: center; justify-content: center; 
  font-weight: 700; color: var(--navy-2); font-size: 22px;
  box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
}
.brand h1 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.brand p { font-size: 13px; opacity: 0.85; font-weight: 400; }
.top .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

/* Buttons & Inputs */
.btn {
  border: none; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 13.5px;
  padding: 8px 16px; border-radius: 8px; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 8px; justify-content: center;
}
.btn i { font-size: 18px; }
.btn:active { transform: translateY(1px); }
.btn-ghost { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
.btn-ghost:hover { background: rgba(255,255,255,0.2); }
.btn-primary { background: var(--gold); color: var(--navy-2); box-shadow: 0 2px 8px rgba(212,175,55,0.3); }
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-soft { background: #eef2f8; color: var(--navy); }
.btn-soft:hover { background: #e2e9f4; }
.btn-danger { background: #fbeae9; color: var(--red); }
.btn-danger:hover { background: #f7d9d7; }
.btn-sm { padding: 6px 12px; font-size: 12.5px; border-radius: 6px; }

.mode-sel {
  background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px; padding: 8px 12px; font-family: inherit; font-weight: 600; font-size: 13.5px; cursor: pointer; outline: none;
}
.mode-sel option { color: #000; }

input, select, textarea {
  font-family: inherit; font-size: 14px; padding: 10px 14px; border: 1px solid var(--line);
  border-radius: 8px; background: #fff; color: var(--ink); width: 100%; transition: 0.2s;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(35,139,158,0.15); }

/* Navigation */
nav.tabs {
  display: flex; gap: 8px; padding: 16px 24px 0; flex-wrap: wrap; max-width: 1400px; margin: 0 auto;
  border-bottom: 1px solid var(--line); background: var(--bg);
}
.tab {
  padding: 12px 20px; border-radius: 10px 10px 0 0; cursor: pointer; font-weight: 600; font-size: 14px;
  color: var(--muted); border: 1px solid transparent; border-bottom: none; transition: 0.2s;
  display: flex; align-items: center; gap: 6px; margin-bottom: -1px;
}
.tab i { font-size: 18px; }
.tab:hover { color: var(--navy); background: rgba(26,42,71,0.04); }
.tab.active {
  background: var(--card); color: var(--navy); border-color: var(--line); 
  border-bottom-color: var(--card); box-shadow: 0 -4px 10px rgba(0,0,0,0.02);
}

/* Layout */
main { max-width: 1400px; margin: 24px auto; padding: 0 24px; }
section.page { display: none; animation: fadeUp 0.3s ease forwards; opacity: 0; }
section.page.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.panel {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-lg);
  box-shadow: var(--shadow); padding: 24px; margin-bottom: 24px;
}
.panel-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.panel-h h2 { font-size: 18px; color: var(--navy); font-weight: 700; display: flex; align-items: center; gap: 8px; }
.panel-h .sub, .sub { font-size: 13.5px; color: var(--muted); font-weight: 400; }

.grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
.grid3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
.grid4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 13px; font-weight: 600; color: var(--muted); display: inline-flex; align-items: center; gap: 4px; }
.has-tooltip { position: relative; cursor: help; }
.has-tooltip i { color: var(--teal); font-size: 15px; opacity: 0.8; transition: 0.2s; }
.has-tooltip:hover i { opacity: 1; transform: scale(1.1); }
.has-tooltip::after {
  content: attr(data-tooltip); position: absolute; bottom: 100%; right: 50%; transform: translateX(50%);
  background: var(--navy); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 12px;
  white-space: normal; width: max-content; max-width: 240px; z-index: 1000;
  opacity: 0; pointer-events: none; transition: 0.2s; font-weight: 500; text-align: right; line-height: 1.5;
  margin-bottom: 8px; box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.1);
}
.has-tooltip::before {
  content: ''; position: absolute; bottom: 100%; right: 50%; transform: translateX(50%);
  border-width: 6px; border-style: solid; border-color: var(--navy) transparent transparent transparent;
  opacity: 0; pointer-events: none; transition: 0.2s; margin-bottom: -4px; z-index: 1000;
}
.has-tooltip:hover::after, .has-tooltip:hover::before { opacity: 1; }
.toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; background: #f8fafc; padding: 12px; border-radius: var(--radius); border: 1px solid var(--line); }

/* KPIs */
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 20px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
  display: flex; flex-direction: column; gap: 8px; transition: transform 0.2s;
}
.kpi:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.kpi::before { content: ""; position: absolute; inset-inline-start: 0; top: 0; bottom: 0; width: 4px; background: var(--navy); }
.kpi.g::before { background: var(--gold); } .kpi.t::before { background: var(--teal); } .kpi.p::before { background: var(--purple); }
.kpi.gr::before { background: var(--green); } .kpi.o::before { background: var(--orange); }
.kpi .header { display: flex; justify-content: space-between; align-items: center; }
.kpi .label { font-size: 13px; color: var(--muted); font-weight: 600; }
.kpi i { font-size: 24px; opacity: 0.3; }
.kpi .val { font-size: 26px; font-weight: 700; color: var(--navy); line-height: 1.2; }
.kpi .val.txt { font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Tables */
.table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; border: 1px solid var(--line); }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; white-space: nowrap; }
th { background: #f8fafc; color: var(--muted); font-weight: 600; padding: 12px 16px; text-align: right; border-bottom: 1px solid var(--line); }
td { padding: 12px 16px; border-bottom: 1px solid var(--line); text-align: right; vertical-align: middle; }
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: #f1f5f9; }
.center { text-align: center !important; }
.num { font-variant-numeric: tabular-nums; font-weight: 600; font-family: monospace; font-size: 14.5px; }

/* Badges & Pills */
.badge { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
.b-dig { background: #e0f2f1; color: #00695c; } .b-sci { background: #e8f5e9; color: #2e7d32; }
.b-vol { background: #f3e5f5; color: #6a1b9a; } .b-lead { background: #fff3e0; color: #e65100; }
.b-lvl { background: var(--navy); color: #fff; } .b-gold { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
.b-ok { background: #e6f1e6; color: #1f5b22; } .b-no { background: #fbeae9; color: #b3261e; }
.b-warn { background: #fdf0e0; color: #8a4612; }
.role-pill { font-size: 12px; padding: 4px 10px; border-radius: 6px; background: #eef2f8; color: var(--navy); font-weight: 600; }
.rank { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; background: #eef2f8; color: var(--muted); }
.rank.r1 { background: linear-gradient(135deg, var(--gold), #e6c862); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.2); transform: scale(1.1); }
.rank.r2 { background: linear-gradient(135deg, #94a3b8, #cbd5e1); color: #fff; }
.rank.r3 { background: linear-gradient(135deg, #b45309, #d97706); color: #fff; }

/* Bars & Charts */
.bar-wrap { background: #eef2f8; border-radius: 999px; height: 8px; overflow: hidden; flex: 1; min-width: 60px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
.bar { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
.barline { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
.barline .nm { width: 150px; font-size: 13.5px; font-weight: 600; }
.barline .vl { width: 50px; text-align: left; font-weight: 700; font-size: 13.5px; color: var(--navy); }
.chart-container { position: relative; height: 300px; width: 100%; margin-top: 20px; }

/* Modals */
.modal-bg { position: fixed; inset: 0; background: rgba(17, 24, 39, 0.7); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; backdrop-filter: blur(4px); }
.modal-bg.show { display: flex; }
.modal { background: #fff; border-radius: var(--radius-lg); max-width: 700px; width: 100%; max-height: 90vh; overflow: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: pop 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes pop { from { transform: scale(0.95) translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-h { padding: 20px 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.modal-h h3 { color: var(--navy); font-size: 18px; display: flex; align-items: center; gap: 8px; }
.modal-b { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.modal-f { padding: 16px 24px; border-top: 1px solid var(--line); display: flex; gap: 12px; background: #f8fafc; border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
.x { cursor: pointer; font-size: 24px; color: var(--muted); background: none; border: none; transition: 0.2s; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
.x:hover { background: #e2e8f0; color: var(--red); }

/* Profile & Card */
.profile { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 24px; padding: 20px; background: linear-gradient(to right, #f8fafc, #ffffff); border-radius: var(--radius); border: 1px solid var(--line); }
.avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, var(--navy), var(--teal)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; overflow: hidden; box-shadow: 0 4px 10px rgba(35,139,158,0.3); border: 3px solid #fff; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile .info h3 { font-size: 22px; color: var(--navy); margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
.profile .info .meta { font-size: 13.5px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.meta-item { display: flex; align-items: center; gap: 4px; }
.section-title { font-size: 16px; font-weight: 700; color: var(--navy); margin: 24px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--line); display: flex; align-items: center; gap: 8px; }

/* Level Progress */
.level-progress { background: #fff; padding: 16px; border-radius: var(--radius); border: 1px solid var(--line); margin-bottom: 24px; }
.level-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13.5px; font-weight: 600; color: var(--navy); }
.level-bar-bg { height: 12px; background: #e2e8f0; border-radius: 999px; overflow: hidden; position: relative; }
.level-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--gold)); border-radius: 999px; transition: width 1s ease-out; }
.level-sub { text-align: center; font-size: 13px; color: var(--navy); font-weight:500; margin-top: 8px; }

.empty { text-align: center; color: var(--muted); padding: 48px 20px; font-size: 15px; display: flex; flex-direction: column; align-items: center; gap: 12px; background: #f8fafc; border-radius: var(--radius); border: 1px dashed #cbd5e1; }
.empty i { font-size: 48px; opacity: 0.2; }
.hint { font-size: 13px; color: var(--navy); background: #f0fdfa; border: 1px dashed #5eead4; border-radius: 8px; padding: 12px 16px; margin-top: 12px; display: flex; gap: 8px; align-items: flex-start; }
.hint i { font-size: 18px; color: #0f766e; }

.savebar { position: fixed; bottom: 20px; inset-inline-start: 20px; background: var(--navy); color: #fff; padding: 12px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 600; box-shadow: var(--shadow-lg); opacity: 0; transform: translateY(20px); transition: 0.3s; pointer-events: none; z-index: 100; display: flex; align-items: center; gap: 8px; }
.savebar.show { opacity: 1; transform: none; }

.subnav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
.subnav .s { padding: 8px 16px; border-radius: 8px; background: transparent; color: var(--muted); font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
.subnav .s:hover { background: #f1f5f9; color: var(--navy); }
.subnav .s.active { background: var(--navy); color: #fff; box-shadow: var(--shadow-sm); }

/* Report PDF Print Styles */
.report-doc { background: #fff; padding: 0; }
.report-head { text-align: center; border-bottom: 3px solid var(--navy); padding-bottom: 16px; margin-bottom: 24px; position: relative; }
.report-head::after { content: ""; position: absolute; bottom: -6px; left: 0; right: 0; height: 1px; background: var(--navy); opacity: 0.3; }
.report-head h2 { color: var(--navy); font-size: 24px; margin-bottom: 8px; }
.report-head p { color: var(--muted); font-size: 14px; }

/* إضافات جديدة لتصميم التقارير والبطاقة */
.insight-box { background: #f0fdfa; border: 1px solid #5eead4; border-radius: var(--radius); padding: 16px; margin-bottom: 24px; color: #0f766e; }
.insight-box h4 { font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.insight-box p { font-size: 13.5px; line-height: 1.6; }
.report-section { margin-top: 32px; }
.report-section h3 { font-size: 18px; color: var(--navy); border-bottom: 2px solid var(--gold); padding-bottom: 8px; margin-bottom: 16px; display: inline-block; }

@media print {
  body { background: #fff; padding: 0; }
  .top, .tabs, .no-print, .savebar { display: none !important; }
  main { max-width: none; padding: 0; margin: 0; }
  .page { display: none !important; }
  #printArea { display: block !important; }
  .panel { box-shadow: none; border: none; padding: 0; margin-bottom: 20px; }
  .kpi { box-shadow: none; border-color: #000; break-inside: avoid; }
  table { border: 1px solid #000; }
  th, td { border: 1px solid #ccc; padding: 8px; }
  .badge, .role-pill { border: 1px solid #000; color: #000 !important; background: transparent !important; }
  /* تنسيق طباعة البطاقة */
  .print-card-mode #printArea { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f3f4f6; }
  .print-card-mode .card-wrap { background: #fff; padding: 40px; border-radius: 20px; border: 2px solid var(--navy); max-width: 800px; width: 100%; box-shadow: none; }
}
#printArea { display: none; }

/* ===== إضافات الإصدار الشامل: الرحلة، الأعمال، المتابعة، التنبيهات، الدليل ===== */

/* خط رحلة الرائد الزمني */
.timeline { position: relative; padding-inline-start: 28px; margin-top: 8px; }
.timeline::before { content: ""; position: absolute; inset-inline-start: 9px; top: 6px; bottom: 6px; width: 2px; background: linear-gradient(to bottom, var(--teal), var(--gold)); border-radius: 2px; }
.tl-item { position: relative; padding: 0 0 20px 0; }
.tl-item:last-child { padding-bottom: 0; }
.tl-dot { position: absolute; inset-inline-start: -27px; top: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 3px solid var(--teal); display: flex; align-items: center; justify-content: center; }
.tl-dot.gold { border-color: var(--gold); } .tl-dot.purple { border-color: var(--purple); } .tl-dot.green { border-color: var(--green); } .tl-dot.navy { border-color: var(--navy); }
.tl-dot i { font-size: 10px; color: var(--teal); }
.tl-dot.gold i { color: var(--gold); } .tl-dot.purple i { color: var(--purple); } .tl-dot.green i { color: var(--green); } .tl-dot.navy i { color: var(--navy); }
.tl-body { background: #f8fafc; border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px; }
.tl-body .tl-date { font-size: 11.5px; color: var(--muted); font-weight: 600; margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
.tl-body .tl-title { font-size: 13.5px; font-weight: 600; color: var(--navy); }
.tl-body .tl-note { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* معرض أعمال الرائد */
.works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.work-card { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 14px; transition: 0.2s; display: flex; flex-direction: column; gap: 8px; border-top: 3px solid var(--teal); }
.work-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.work-card.c-dig { border-top-color: var(--dig); } .work-card.c-sci { border-top-color: var(--sci); }
.work-card.c-vol { border-top-color: var(--vol); } .work-card.c-lead { border-top-color: var(--lead); }
.work-card .wc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.work-card .wc-act { font-size: 13.5px; font-weight: 700; color: var(--navy); line-height: 1.4; }
.work-card .wc-pts { background: var(--navy); color: #fff; border-radius: 8px; padding: 4px 10px; font-weight: 700; font-size: 13px; white-space: nowrap; font-family: monospace; }
.work-card .wc-pts.neg { background: var(--red); }
.work-card .wc-desc { font-size: 12.5px; color: var(--ink); line-height: 1.5; }
.work-card .wc-meta { display: flex; flex-wrap: wrap; gap: 6px 12px; font-size: 11.5px; color: var(--muted); margin-top: auto; padding-top: 8px; border-top: 1px dashed var(--line); }
.work-card .wc-meta span { display: inline-flex; align-items: center; gap: 3px; }
.work-card .wc-meta a { color: var(--teal); text-decoration: none; font-weight: 600; }
.work-card .wc-meta a:hover { text-decoration: underline; }
.work-card .wc-engage { display: flex; gap: 12px; font-size: 11.5px; color: var(--muted); }
.work-card .wc-engage b { color: var(--navy); }
.works-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.wf-chip { padding: 6px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 600; cursor: pointer; border: 1px solid var(--line); background: #fff; color: var(--muted); transition: 0.2s; }
.wf-chip:hover { border-color: var(--teal); color: var(--teal); }

.pulse-card.idle { border-inline-start: 4px solid var(--orange); background: #fffaf3; }

.alert-row { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; gap: 10px; align-items: flex-start; cursor: pointer; transition: 0.15s; }
.alert-row:hover { background: #f8fafc; }

.alert-row .ar-ic { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
.ar-ic.warn { background: #fdf0e0; color: var(--orange); } .ar-ic.danger { background: #fbeae9; color: var(--red); }
.ar-ic.info { background: #e0f2f1; color: var(--teal); } .ar-ic.ok { background: #e6f4ea; color: var(--green); }
.alert-row .ar-txt { flex: 1; }
.alert-row .ar-title { font-size: 13px; font-weight: 600; color: var(--ink); }
.alert-row .ar-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.alerts-empty { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px; }
.alerts-empty i { font-size: 36px; color: var(--green); opacity: 0.4; display: block; margin-bottom: 8px; }

/* أزرار أيقونية مدمجة في الهيدر */

/* دليل الفريق */

.guide-tab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }

/* تفكيك حساب النقاط الشفاف */
.calc-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }

@media print {
  .alerts-pop, .bell-wrap, .guide-step .gs-num { box-shadow: none; }
}

<body>

<header class="top">
  <div class="brand">
    <div class="mark"><i class="ph-bold ph-star"></i></div>
    <div>
      <h1>لوحة أثر الرواد</h1>
      <p>شبكة الرواد الإلكترونية · الإصدار الشامل</p>
    </div>
  </div>
  <div class="actions">
    <div class="bell-wrap">
      <button class="btn btn-ghost btn-icon bell-btn" onclick="toggleAlerts(event)" title="التنبيهات والمتابعة"><i class="ph-fill ph-bell"></i><span class="bell-badge" id="bellBadge" style="display:none">0</span></button>
      <div class="alerts-pop" id="alertsPop"></div>
    </div>
    <button class="btn btn-ghost btn-icon" onclick="openGuide()" title="دليل استخدام اللوحة"><i class="ph-fill ph-book-open-text"></i></button>
    <select class="mode-sel" id="modeSel" onchange="setMode(this.value)" title="وضع الصلاحية">
      <option value="إدارة">👤 الإدارة</option>
      <option value="مشرف">👀 المشرف</option>
      <option value="عضو">👥 العضو</option>
    </select>
    <div class="menu-wrap adminonly">
      <button class="btn btn-ghost btn-icon" onclick="toggleMenu(event)" title="أدوات الإدارة (نسخ احتياطي وبيانات)"><i class="ph-bold ph-dots-three-vertical"></i></button>
      <div class="menu-pop" id="toolsMenu">
        <button onclick="closeMenu();exportJSON()"><i class="ph ph-download-simple"></i> نسخة احتياطية</button>
        <button onclick="closeMenu();document.getElementById('importFile').click()"><i class="ph ph-upload-simple"></i> استرجاع نسخة</button>
        <button onclick="closeMenu();loadDemo()"><i class="ph ph-database"></i> تحميل بيانات تجريبية</button>
        <button class="danger" onclick="closeMenu();resetAll()"><i class="ph ph-trash"></i> تفريغ كل البيانات</button>
      </div>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<main>
  <section class="page active" id="page-dashboard"></section>
  <section class="page" id="page-members"></section>
  <section class="page" id="page-activities"></section>
  <section class="page" id="page-pulse"></section>
  <section class="page" id="page-card"></section>
  <section class="page" id="page-compare"></section>
  <section class="page" id="page-rewards"></section>
  <section class="page" id="page-reports"></section>

</main>

<div id="printArea"></div>

<script>
/* ===== Constants ===== */
const CAT = { DIG: "النشاط الرقمي", SCI: "المشاركة العلمية والفعاليات", VOL: "المبادرات والإنتاج", LEAD: "الالتزام والانضباط" };
const CAT_CLASS = { [CAT.DIG]: "b-dig", [CAT.SCI]: "b-sci", [CAT.VOL]: "b-vol", [CAT.LEAD]: "b-lead" };
const CAT_VAR = { [CAT.DIG]: "--dig", [CAT.SCI]: "--sci", [CAT.VOL]: "--vol", [CAT.LEAD]: "--lead" };
const ROLES = ["باحث ومفكر", "مؤثر رقمي", "متطوع", "مشرف", "رئيس منصة"];
const STATUS = ["معتمد", "قيد المراجعة", "مرفوض"];
const MSTATUS = ["نشط", "متوقف", "تحت التجربة"];
const PLATFORMS_LIST = [
  "منصة ساند الإعلامية", "المنصة العالمية للدفاع عن حقوق الإنسان", "منصة المرأة المسلمة", 
  "المنصة التربوية الشاملة", "منصة مفكر", "منصة تمكين العمل الإنساني", 
  "منصة كلنا دعاة", "منصة أفق السياسة", "منصة الإدارة والاقتصاد الإسلامي"
];
const BADGE_CATALOG = ["درع رائد الشهر", "درع المؤثر الرقمي", "درع الباحث المنتج", "درع المتطوع المثالي", "درع المبادرة", "درع العطاء المستمر", "درع القيادة", "درع العضو الصاعد", "درع الوفاء", "جائزة رائد السنة", "جائزة المؤثر الأول", "جائزة الباحث الملهم", "جائزة المتطوع الذهبي", "جائزة القيادة", "جائزة العمرة"];
const KEY = "ruwad_impact_db_v3"; 
const MONTHS = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
const TABS = [
  { id: "dashboard", t: "الرئيسية", icon: "ph-squares-four" },
  { id: "members", t: "الأعضاء", icon: "ph-users" },
  { id: "activities", t: "الأنشطة", icon: "ph-activity" },
  { id: "pulse", t: "المتابعة الدورية", icon: "ph-pulse" },
  { id: "card", t: "بطاقة الرائد", icon: "ph-identification-card" },
  { id: "compare", t: "المقارنة", icon: "ph-chart-bar" },
  { id: "rewards", t: "المكافآت", icon: "ph-medal" },
  { id: "reports", t: "التقارير", icon: "ph-file-text" },
  { id: "criteria", t: "الإعدادات", icon: "ph-gear" },
];

/* ===== Global Charts Instances ===== */
let dashChart1 = null;
let dashChart2 = null;
let cardChart = null;

/* ===== Default Data Setup ===== */
function defaultCriteria(){
  const A = (n, p, c, note = "") => ({ name: n, points: p, category: c, note });
  return {
    activities: [
      A("منشور احترافي (مقال/تصميم/فيديو)", 5, CAT.DIG, "محتوى أصيل عالي القيمة"), 
      A("منشور قصير أو مشاركة", 2, CAT.DIG, ""),
      A("التفاعل على الواتساب / الجروبات", 2, CAT.DIG, "مشاركة يومية فعالة"),
      A("إعادة نشر محتوى الشبكة", 1, CAT.DIG, ""), 
      A("بونص: منشور حقّق وصولًا لافتًا", 3, CAT.DIG, "لكل منشور تجاوز عتبة تفاعل"),
      A("التفاعل مع حملة من حملات الشبكة", 3, CAT.DIG, ""), 
      A("جذب عضو/متابع جديد", 10, CAT.DIG, "إحالة موثّقة"),
      
      A("كتابة مقال قصير", 30, CAT.SCI, ""), 
      A("كتابة مقال تحليلي طويل", 60, CAT.SCI, ""), 
      A("إعداد ورقة بحثية", 100, CAT.SCI, ""),
      A("تقديم محاضرة داخلية", 50, CAT.SCI, ""), 
      A("تقديم محاضرة عامة", 80, CAT.SCI, ""), 
      A("المشاركة في ندوة/مؤتمر افتراضي", 40, CAT.SCI, ""),
      A("إدارة جلسة حوارية", 35, CAT.SCI, ""), 
      A("حضور ورشة عمل", 15, CAT.SCI, "مشاركة فعالة"),
      
      A("تصميم منشور/إنفوجرافيك", 15, CAT.VOL, ""), 
      A("تصميم عرض تقديمي", 25, CAT.VOL, ""), 
      A("مونتاج فيديو قصير", 25, CAT.VOL, ""),
      A("مونتاج محاضرة كاملة", 50, CAT.VOL, ""), 
      A("تفريغ محاضرة", 30, CAT.VOL, ""), 
      A("ترجمة محتوى قصير", 25, CAT.VOL, ""),
      A("إدارة مجموعة واتساب يوميًا", 10, CAT.VOL, ""), 
      A("تنظيم لقاء افتراضي", 40, CAT.VOL, ""),
      
      A("إنجاز مهمة في وقتها", 20, CAT.LEAD, ""), 
      A("إنجاز مهمة قبل الوقت", 30, CAT.LEAD, ""),
      A("الالتزام بالحضور الأسبوعي", 15, CAT.LEAD, ""), 
      A("حضور اجتماع إداري", 10, CAT.LEAD, ""), 
      A("تسليم التقرير في وقته", 20, CAT.LEAD, ""),
      A("المبادرة دون تكليف", 30, CAT.LEAD, "مبادرة استراتيجية أو تنظيمية"), 
      A("مساعدة عضو جديد", 20, CAT.LEAD, ""), 
      A("قيادة مبادرة أو فريق", 30, CAT.LEAD, ""),
      
      A("خصم: تأخر متكرر عن التسليم", -10, CAT.LEAD, "قيمة سالبة"), 
      A("خصم: إدخال نشاط غير دقيق", -20, CAT.LEAD, "قيمة سالبة"),
      A("خصم: غياب دون عذر عن مهمة", -15, CAT.LEAD, "قيمة سالبة")
    ],
    quality: [
      { label: "ضعيف", bonus: -3 }, 
      { label: "مقبول", bonus: 0 }, 
      { label: "جيد", bonus: 3 }, 
      { label: "ممتاز", bonus: 6 }, 
      { label: "استثنائي", bonus: 10 }
    ],
    levels: [
      { name: "عضو جديد", from: 0, to: 99, desc: "في بداية الرحلة" }, 
      { name: "عضو نشط", from: 100, to: 299, desc: "يشارك بشكل مقبول" }, 
      { name: "عضو مؤثر", from: 300, to: 599, desc: "له حضور واضح" },
      { name: "عضو متميز", from: 600, to: 999, desc: "من أصحاب الأداء العالي" }, 
      { name: "رائد ذهبي", from: 1000, to: 1999, desc: "من أعمدة الشبكة" }, 
      { name: "سفير الرواد", from: 2000, to: 9999999, desc: "عضو استراتيجي ومؤثر جدًا" }
    ]
  };
}
function defaultSettings(){
  return {
    rewardTiers: [
      { min: 0, max: 99, label: "لا مكافأة" }, { min: 100, max: 149, label: "رمزية" }, { min: 150, max: 249, label: "أساسية" },
      { min: 250, max: 399, label: "متوسطة" }, { min: 400, max: 9999999, label: "كاملة + درع" }
    ],
    umrah: { minYearly: 3000, minMonths: 9, minInitiatives: 1, requireExcellent: true, noViolations: true }
  };
}

/* ===== State Management ===== */
let state = load();
function blankState(){
  return { members: [], activities: [], awards: [], criteria: defaultCriteria(), settings: defaultSettings(), gates: {}, ui: { mode: "إدارة" } };
}
function load(){
  try {
    const d = JSON.parse(localStorage.getItem(KEY));
    if(d && d.criteria){
      d.settings = d.settings || defaultSettings();
      d.gates = d.gates || {};
      d.ui = d.ui || { mode: "إدارة" };
      
      // Migration for old levels missing descriptions
      if(d.criteria.levels && !d.criteria.levels[0].desc) {
          const defLevels = defaultCriteria().levels;
          d.criteria.levels.forEach((l, i) => { if(defLevels[i]) l.desc = defLevels[i].desc; });
      }
      
      return d;
    }
  } catch(e) {}
  return blankState();
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); flashSave(); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
let st; 
function flashSave(){
  const b = document.getElementById('savebar');
  b.classList.add('show');
  clearTimeout(st);
  st = setTimeout(() => b.classList.remove('show'), 1500);
}
function esc(s){ return (s == null ? "" : String(s)).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

/* ===== Modal & Utilities ===== */
let _onSave = null;
function openModal(title, body, onSave) {
  _onSave = onSave;
  document.getElementById('modal').innerHTML = `
    <div class="modal-h"><h3>${title}</h3><button class="x" onclick="closeModal()"><i class="ph ph-x"></i></button></div>
    <div class="modal-b">${body}</div>
    <div class="modal-f">
      <button class="btn btn-primary" onclick="doSave()"><i class="ph-bold ph-floppy-disk"></i> حفظ البيانات</button>
      <button class="btn btn-soft" onclick="closeModal()">إلغاء</button>
    </div>`;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() { document.getElementById('modalBg').classList.remove('show'); _onSave = null; }
function doSave() { if (_onSave && _onSave() !== false) closeModal(); }
function val(id) { return document.getElementById(id).value; }
function today() { return new Date().toISOString().slice(0, 10); }

document.getElementById('modalBg').addEventListener('click', e => { if (e.target.id === 'modalBg') closeModal(); });

/* ===== جرس التنبيهات ولوحة المتابعة ===== */
function refreshBell(){
  const badge = document.getElementById('bellBadge'); if(!badge) return;
  const n = computeAlerts().length;
  if(n > 0){ badge.style.display = "flex"; badge.textContent = n > 99 ? "99+" : n; }
  else badge.style.display = "none";
}
function toggleAlerts(e){
  e.stopPropagation();
  const pop = document.getElementById('alertsPop');
  if(pop.classList.contains('show')){ pop.classList.remove('show'); return; }
  renderAlertsPop();
  pop.classList.add('show');
}
function renderAlertsPop(){
  const pop = document.getElementById('alertsPop');
  const alerts = computeAlerts();
  const groupIcon = { danger: "danger", warn: "warn", info: "info", ok: "ok" };
  let body;
  if(!alerts.length){
    body = `<div class="alerts-empty"><i class="ph-fill ph-check-circle"></i>لا توجد تنبيهات حالياً.<br>كل شيء على ما يُرام 👌</div>`;
  } else {
    // ترتيب: الأهم أولاً (خطر، تحذير، معلومة، تحفيز)
    const order = { danger: 0, warn: 1, info: 2, ok: 3 };
    alerts.sort((a,b) => order[a.kind] - order[b.kind]);
    body = alerts.map(a => `<div class="alert-row" onclick="handleAlertClick('${a.tab}', ${a.mid ? `'${a.mid}'` : 'null'})">
        <div class="ar-ic ${groupIcon[a.kind]}"><i class="${a.icon}"></i></div>
        <div class="ar-txt"><div class="ar-title">${esc(a.title)}</div><div class="ar-sub">${esc(a.sub)}</div></div>
      </div>`).join('');
  }

/* ===== Calculations & Logic ===== */
function actMeta(name){ return state.criteria.activities.find(a => a.name === name) || { points: 0, category: "" }; }
function qBonus(l){ const q = state.criteria.quality.find(q => q.label === l); return q ? q.bonus : 0; }
function levelObjOf(t){
  const L = state.criteria.levels.find(l => t >= l.from && t <= l.to);
  return L || state.criteria.levels[state.criteria.levels.length-1];
}
function levelOf(t){ return levelObjOf(t).name; }
function memberById(id){ return state.members.find(m => m.id === id); }
function memberName(id){ const m = memberById(id); return m ? m.name : "—"; }
function isNeg(a){ return actMeta(a.activity).points < 0; }
function memberActs(id){ return state.activities.filter(a => a.memberId === id); }

// مبدأ الجمع البسيط مع بونص الجودة
function finalPoints(a){
  if(a.status === "مرفوض" || a.status === "قيد المراجعة") return 0;
  const m = actMeta(a.activity);
  const c = (a.count === "" || a.count == null) ? 1 : Number(a.count) || 0;
  // النقاط = (العدد × قيمة النشاط) + بونص الجودة
  return (c * m.points) + qBonus(a.quality);
}

function memberTotal(id){ return memberActs(id).reduce((s, a) => s + finalPoints(a), 0); }
function memberByCat(id){
  const o = {}; Object.values(CAT).forEach(c => o[c] = 0);
  memberActs(id).forEach(a => { const c = actMeta(a.activity).category; if(c in o) o[c] += finalPoints(a); });
  return o;
}
function inMonth(d, y, m){ const x = new Date(d); return d && x.getFullYear() === y && (x.getMonth() + 1) === m; }
function inYear(d, y){ const x = new Date(d); return d && x.getFullYear() === y; }
function inWeek(d, ref){
  if(!d) return false;
  const x = new Date(d), r = new Date(ref);
  const start = new Date(r); start.setDate(r.getDate() - 6); start.setHours(0, 0, 0, 0);
  const end = new Date(r); end.setHours(23, 59, 59, 999);
  return x >= start && x <= end;
}
function scopedPoints(id, sc){
  if(sc.type === "month") return memberActs(id).filter(a => inMonth(a.date, sc.y, sc.m)).reduce((s, a) => s + finalPoints(a), 0);
  if(sc.type === "week") return memberActs(id).filter(a => inWeek(a.date, sc.ref)).reduce((s, a) => s + finalPoints(a), 0);
  return memberTotal(id);
}
function scopedActs(id, sc){
  return memberActs(id).filter(a => sc.type === "month" ? inMonth(a.date, sc.y, sc.m) : sc.type === "week" ? inWeek(a.date, sc.ref) : true);
}
function memberMonthly(id,y,m) { return scopedPoints(id, {type:"month", y, m}); }
function memberYearly(id,y) { return memberActs(id).filter(a => inYear(a.date,y)).reduce((s,a)=>s+finalPoints(a),0); }

function memberBadges(id){ return state.awards.filter(w => w.memberId === id && w.type === "درع").length; }
function memberRewards(id){ return state.awards.filter(w => w.memberId === id && w.type === "مكافأة").reduce((s, w) => s + (Number(w.value) || 0), 0); }
function initiatives(id, y){ return memberActs(id).filter(a => a.activity.includes("مبادرة") && (y == null || inYear(a.date, y))).length; }
function activeMonths(id, y){
  const s = new Set();
  memberActs(id).forEach(a => { if(inYear(a.date, y)) s.add(new Date(a.date).getMonth()); });
  return s.size;
}
function hasExcellent(id, y){ return memberActs(id).some(a => inYear(a.date, y) && (a.quality === "ممتاز" || a.quality === "استثنائي")); }
function hasViolations(id, y){ return memberActs(id).some(a => inYear(a.date, y) && isNeg(a)); }

function platforms(){ const s = new Set(); state.members.forEach(m => { if(m.platform) s.add(m.platform); }); return [...s]; }
function platformAgg(sc){
  return platforms().map(p => {
    const ms = state.members.filter(m => m.platform === p);
    const pts = ms.reduce((s, m) => s + (sc ? scopedPoints(m.id, sc) : memberTotal(m.id)), 0);
    const acts = ms.reduce((s, m) => s + (sc ? scopedActs(m.id, sc).length : memberActs(m.id).length), 0);
    let best = "—", bv = -1e9;
    ms.forEach(m => { const v = sc ? scopedPoints(m.id, sc) : memberTotal(m.id); if(v > bv){ bv = v; best = m.name; } });
    return { platform: p, count: ms.length, acts, points: pts, best, bestVal: Math.max(0, bv), avg: ms.length ? Math.round(pts / ms.length) : 0 };
  }).sort((a, b) => b.points - a.points);
}
function summaryScoped(sc){
  return state.members.map(m => ({ ...m, total: scopedPoints(m.id, sc), level: levelOf(scopedPoints(m.id, sc)), acts: scopedActs(m.id, sc).length })).sort((a, b) => b.total - a.total);
}
function topByCat(cat, role, sc){
  let best = null, bv = -1e9;
  state.members.forEach(m => {
    if(role && m.role !== role) return;
    const acts = scopedActs(m.id, sc);
    const v = acts.filter(a => actMeta(a.activity).category === cat).reduce((s, a) => s + finalPoints(a), 0);
    if(v > bv){ bv = v; best = m; }
  });
  return best ? { name: best.name, val: bv } : null;
}
function topRole(role, sc){
  let best = null, bv = -1e9;
  state.members.forEach(m => { if(m.role !== role) return; const v = scopedPoints(m.id, sc); if(v > bv){ bv = v; best = m; } });
  return best ? { name: best.name, val: bv } : null;
}
function rewardTier(pts){ const t = state.settings.rewardTiers.find(t => pts >= t.min && pts <= t.max); return t ? t.label : "—"; }
function gateKey(id, y, m){ return id + "_" + y + "_" + m; }
function gateOK(id, y, m){ const v = state.gates[gateKey(id, y, m)]; return v === undefined ? true : !!v; }

/* ===== متابعة دورية: اتجاهات وخمول ورحلة وتنبيهات ===== */
function approvedActs(id){ return memberActs(id).filter(a => a.status === "معتمد"); }
function lastActiveDate(id){
  const ds = approvedActs(id).map(a => a.date).filter(Boolean).sort();
  return ds.length ? ds[ds.length - 1] : null;
}
function daysSince(dateStr){
  if(!dateStr) return Infinity;
  const d = new Date(dateStr); if(isNaN(d)) return Infinity;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}
// تصنيف حالة العضو حسب آخر نشاط معتمد: نشط / خامل / متوقف
function activityStatus(id){
  const d = daysSince(lastActiveDate(id));
  if(d <= 7) return { key: "active", label: "نشط هذا الأسبوع", dot: "g", since: d };
  if(d <= 30) return { key: "month", label: "نشط هذا الشهر", dot: "g", since: d };
  if(d <= 60) return { key: "idle", label: "خامل (٣٠–٦٠ يوم)", dot: "o", since: d };
  return { key: "dormant", label: d === Infinity ? "لم يبدأ بعد" : "متوقف (+٦٠ يوم)", dot: "r", since: d };
}
// نقاط العضو لكل شهر في سنة معينة (12 قيمة) — لرسم اتجاه الرحلة
function memberMonthlyTrend(id, y){
  const arr = new Array(12).fill(0);
  approvedActs(id).forEach(a => { if(inYear(a.date, y)) arr[new Date(a.date).getMonth()] += finalPoints(a); });
  return arr;
}
// اتجاه نشاط الشبكة عبر آخر N فترة (أسبوع/شهر)
function networkTrend(type, count){
  const out = []; const now = new Date();
  if(type === "month"){
    for(let i = count - 1; i >= 0; i--){
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const y = d.getFullYear(), m = d.getMonth() + 1;
      let pts = 0, acts = 0;
      state.members.forEach(mb => { const sc = {type:"month", y, m}; pts += scopedPoints(mb.id, sc); acts += scopedActs(mb.id, sc).length; });
      out.push({ label: MONTHS[m-1].slice(0,3) + " " + String(y).slice(2), points: pts, acts });
    }
  } else {
    for(let i = count - 1; i >= 0; i--){
      const ref = new Date(now); ref.setDate(now.getDate() - i * 7);
      const refStr = ref.toISOString().slice(0,10);
      let pts = 0, acts = 0;
      state.members.forEach(mb => { const sc = {type:"week", ref: refStr}; pts += scopedPoints(mb.id, sc); acts += scopedActs(mb.id, sc).length; });
      const dd = String(ref.getDate()).padStart(2,'0') + "/" + String(ref.getMonth()+1).padStart(2,'0');
      out.push({ label: "أسبوع " + dd, points: pts, acts });
    }
  }
  return out;
}
// نقاط المنصة في فترة محددة
function platformPeriodPoints(plat, sc){
  return state.members.filter(m => m.platform === plat).reduce((s, m) => s + scopedPoints(m.id, sc), 0);
}
function platformPeriodActs(plat, sc){
  return state.members.filter(m => m.platform === plat).reduce((s, m) => s + scopedActs(m.id, sc).length, 0);
}
// المستوى التالي والمسافة المتبقية — للتحفيز والتنبيه بقرب الترقية
function nextLevelGap(total){
  const cur = levelObjOf(total);
  const idx = state.criteria.levels.findIndex(l => l.name === cur.name);
  const nxt = state.criteria.levels[idx + 1];
  if(!nxt) return null;
  return { name: nxt.name, gap: Math.max(0, nxt.from - total) };
}
// أحداث رحلة الرائد (انضمام + دروع + أول نشاط + بلوغ مستويات)
function memberJourney(id){
  const m = memberById(id); const ev = [];
  if(m.joinDate) ev.push({ date: m.joinDate, type: "join", title: "الانضمام إلى شبكة الرواد", note: m.platform ? "على " + m.platform : "", icon: "ph-fill ph-flag-banner", cls: "navy" });
  const acts = approvedActs(id).slice().sort((a,b) => (a.date||"").localeCompare(b.date||""));
  if(acts.length) ev.push({ date: acts[0].date, type: "first", title: "أول نشاط معتمد", note: acts[0].activity, icon: "ph-fill ph-rocket-launch", cls: "green" });
  // بلوغ المستويات (تراكميًا عبر الزمن)
  let run = 0; const reached = new Set();
  acts.forEach(a => {
    run += finalPoints(a);
    const lv = levelObjOf(run);
    if(!reached.has(lv.name) && lv.from > 0){ reached.add(lv.name); ev.push({ date: a.date, type: "level", title: "بلوغ مستوى: " + lv.name, note: "تجاوز " + lv.from + " نقطة", icon: "ph-fill ph-trend-up", cls: "purple" }); }
  });
  state.awards.filter(w => w.memberId === id).forEach(w => ev.push({ date: w.date, type: "award", title: (w.type === "درع" ? "نيل درع: " : "مكافأة: ") + w.title, note: w.approvedBy ? "اعتماد: " + w.approvedBy : "", icon: "ph-fill ph-medal", cls: "gold" }));
  return ev.filter(e => e.date).sort((a,b) => (b.date||"").localeCompare(a.date||""));
}
// حساب التنبيهات المركزية
function computeAlerts(){
  const now = new Date(); const y = now.getFullYear(), m = now.getMonth() + 1;
  const out = [];
  // أنشطة قيد المراجعة
  const pending = state.activities.filter(a => a.status === "قيد المراجعة");
  pending.slice(0, 6).forEach(a => out.push({ kind: "info", icon: "ph-fill ph-hourglass-medium", title: "نشاط بانتظار الاعتماد", sub: memberName(a.memberId) + " · " + a.activity, tab: "activities" }));
  if(pending.length > 6) out.push({ kind: "info", icon: "ph-fill ph-hourglass-medium", title: "و" + (pending.length - 6) + " أنشطة أخرى قيد المراجعة", sub: "افتح سجل الأنشطة للمراجعة", tab: "activities" });
  // أعضاء خاملون/متوقفون (نشطون فقط)
  state.members.filter(mb => (mb.mstatus || "نشط") === "نشط").forEach(mb => {
    const s = activityStatus(mb.id);
    if(s.key === "dormant" && s.since !== Infinity) out.push({ kind: "danger", icon: "ph-fill ph-moon", title: "عضو متوقف: " + mb.name, sub: "آخر نشاط منذ " + s.since + " يوم", tab: "pulse" });
    else if(s.key === "idle") out.push({ kind: "warn", icon: "ph-fill ph-warning", title: "عضو يحتاج متابعة: " + mb.name, sub: "خامل منذ " + s.since + " يوم", tab: "pulse" });
  });
  // قرب الترقية (تحفيز)
  state.members.forEach(mb => {
    const t = memberTotal(mb.id); const ng = nextLevelGap(t);
    if(ng && ng.gap > 0 && ng.gap <= 50) out.push({ kind: "ok", icon: "ph-fill ph-arrow-fat-up", title: mb.name + " يقترب من الترقية", sub: "يبعد " + ng.gap + " نقطة عن «" + ng.name + "»", tab: "card", mid: mb.id });
  });
  // بوابات متعثرة لأصحاب نقاط مرتفعة هذا الشهر
  state.members.forEach(mb => {
    const pts = memberMonthly(mb.id, y, m);
    if(pts > 0 && !gateOK(mb.id, y, m)) out.push({ kind: "warn", icon: "ph-fill ph-lock-key", title: "بوابة متعثرة: " + mb.name, sub: pts + " نقطة هذا الشهر دون استحقاق", tab: "rewards" });
  });
  return out;
}

let currentTab = "dashboard";
function buildTabs(){
  document.getElementById('tabs').innerHTML = TABS.map((t, i) =>
    `<div class="tab ${i === 0 ? 'active' : ''}" data-id="${t.id}" onclick="goto('${t.id}')"><i class="ph ${t.icon}"></i> ${t.t}</div>`
  ).join('');

function goto(id){
  currentTab = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  render(id);
}
function render(id){
  const renderMap = {
    dashboard: renderDashboard, members: renderMembers, activities: renderActivities,
    pulse: renderPulse, card: renderCard, compare: renderCompare, rewards: renderRewards,

}

/* ===== Export to CSV ===== */
function exportTableToCSV(tableId, filename) {
  const table = document.querySelector(`#${tableId} table`);
  if (!table) return alert("لا يوجد جدول للتصدير");
  let csv = [];
  const rows = table.querySelectorAll("tr");
  for (let i = 0; i < rows.length; i++) {
    let row = [], cols = rows[i].querySelectorAll("td, th");
    for (let j = 0; j < cols.length; j++) {
      let data = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, "").trim();
      data = data.replace(/"/g, '""');
      row.push('"' + data + '"');
    }
    csv.push(row.join(","));
  }
  const csvFile = new Blob(["\uFEFF"+csv.join("\n")], {type: "text/csv;charset=utf-8;"});
  const url = window.URL.createObjectURL(csvFile);
  const a = document.createElement("a");
  a.href = url; a.download = filename + ".csv"; a.click();
}

/* ===== Views: المتابعة الدورية (Pulse) ===== */
let pulseTrendChart = null;
function renderPulse(){
  const type = window._pulseType || "week"; // week | month
  const now = new Date();
  const sc = type === "week" ? { type: "week", ref: today() } : { type: "month", y: now.getFullYear(), m: now.getMonth() + 1 };
  // الفترة السابقة للمقارنة
  let prevSc;
  if(type === "week"){ const r = new Date(now); r.setDate(now.getDate() - 7); prevSc = { type: "week", ref: r.toISOString().slice(0,10) }; }
  else { const d = new Date(now.getFullYear(), now.getMonth() - 1, 1); prevSc = { type: "month", y: d.getFullYear(), m: d.getMonth() + 1 }; }
  const periodLabel = type === "week" ? "هذا الأسبوع" : "هذا الشهر";

  // إجماليات الفترة
  const curPts = state.members.reduce((s, m) => s + scopedPoints(m.id, sc), 0);
  const prevPts = state.members.reduce((s, m) => s + scopedPoints(m.id, prevSc), 0);
  const curActs = state.members.reduce((s, m) => s + scopedActs(m.id, sc).length, 0);
  const prevActs = state.members.reduce((s, m) => s + scopedActs(m.id, prevSc).length, 0);
  const curActive = state.members.filter(m => scopedPoints(m.id, sc) !== 0 || scopedActs(m.id, sc).length).length;
  const prevActive = state.members.filter(m => scopedActs(m.id, prevSc).length).length;
  const pending = state.activities.filter(a => a.status === "قيد المراجعة").length;

  // حالة الأعضاء
  const memStatus = state.members.map(m => ({ m, st: activityStatus(m.id), cur: scopedPoints(m.id, sc), last: lastActiveDate(m.id) }));
  const idle = memStatus.filter(x => (x.m.mstatus || "نشط") === "نشط" && (x.st.key === "idle" || x.st.key === "dormant")).sort((a,b) => b.st.since - a.st.since);
  const activeList = memStatus.filter(x => x.st.key === "active" || x.st.key === "month").sort((a,b) => b.cur - a.cur);

  // مقارنة المنصات بالفترة الحالية مقابل السابقة
  const platRows = platforms().map(p => {
    const c = platformPeriodPoints(p, sc), pr = platformPeriodPoints(p, prevSc);
    const ca = platformPeriodActs(p, sc);
    return { p, cur: c, prev: pr, acts: ca, count: state.members.filter(m => m.platform === p).length };
  }).sort((a,b) => b.cur - a.cur);

  const delta = (c, p) => {
    if(p === 0 && c === 0) return `<span class="delta flat">—</span>`;
    if(p === 0) return `<span class="delta up"><i class="ph-bold ph-arrow-up"></i> جديد</span>`;
    const pct = Math.round(((c - p) / Math.abs(p)) * 100);
    if(pct > 0) return `<span class="delta up"><i class="ph-bold ph-arrow-up"></i> ${pct}%</span>`;
    if(pct < 0) return `<span class="delta down"><i class="ph-bold ph-arrow-down"></i> ${Math.abs(pct)}%</span>`;
    return `<span class="delta flat">ثابت</span>`;
  };

  document.getElementById('page-pulse').innerHTML = `
  <div class="panel" style="padding:16px 24px">
    <div class="toolbar" style="margin:0; background:transparent; border:none; padding:0">
      <div class="field" style="max-width:200px"><label>دورة المتابعة</label>
        <select onchange="window._pulseType=this.value;renderPulse()">
          <option value="week" ${type==='week'?'selected':''}>📅 أسبوعية</option>
          <option value="month" ${type==='month'?'selected':''}>🗓️ شهرية</option>
        </select></div>
      <span class="role-pill" style="margin-right:auto"><i class="ph-fill ph-pulse"></i> رصد نبض الشبكة — ${periodLabel}</span>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi t"><div class="header"><div class="label">نقاط ${periodLabel}</div><i class="ph-fill ph-star"></i></div><div class="val">${curPts}</div><div>${delta(curPts, prevPts)} <span class="sub">مقابل ${prevPts} سابقاً</span></div></div>
    <div class="kpi g"><div class="header"><div class="label">أنشطة ${periodLabel}</div><i class="ph-fill ph-check-square-offset"></i></div><div class="val">${curActs}</div><div>${delta(curActs, prevActs)} <span class="sub">مقابل ${prevActs} سابقاً</span></div></div>
    <div class="kpi gr"><div class="header"><div class="label">الأعضاء المتفاعلون</div><i class="ph-fill ph-user-check"></i></div><div class="val">${curActive}</div><div>${delta(curActive, prevActive)} <span class="sub">من ${state.members.length} عضو</span></div></div>
    <div class="kpi o"><div class="header"><div class="label">يحتاجون متابعة</div><i class="ph-fill ph-warning"></i></div><div class="val">${idle.length}</div><div><span class="sub">أعضاء خاملون أو متوقفون</span></div></div>
    <div class="kpi p"><div class="header"><div class="label">بانتظار الاعتماد</div><i class="ph-fill ph-hourglass-medium"></i></div><div class="val">${pending}</div><div><span class="sub">أنشطة قيد المراجعة</span></div></div>
  </div>

  <div class="panel">
    <div class="panel-h"><h2><i class="ph-fill ph-chart-line-up"></i> اتجاه نشاط الشبكة</h2><span class="sub">آخر ${type==='week'?'٨ أسابيع':'٦ أشهر'}</span></div>
    <div class="chart-container"><canvas id="pulseTrend"></canvas></div>
  </div>

  <div class="grid2">
    <div class="panel" id="platPulseWrap">
      <div class="panel-h"><h2><i class="ph-fill ph-monitor-play"></i> نبض المنصات</h2>
        <button class="btn btn-soft btn-sm" onclick="exportTableToCSV('platPulseWrap','نبض_المنصات')"><i class="ph ph-download-simple"></i> تصدير</button></div>
      ${platRows.length ? `<div class="table-responsive"><table><thead><tr><th>المنصة</th><th class="center">الأعضاء</th><th class="center">أنشطة الفترة</th><th class="center">نقاط الفترة</th><th class="center">الاتجاه</th></tr></thead>
        <tbody>${platRows.map(r => `<tr><td><b>${esc(r.p)}</b></td><td class="center num">${r.count}</td><td class="center num">${r.acts}</td>
          <td class="center num" style="color:var(--navy);font-weight:700">${r.cur}</td><td class="center">${delta(r.cur, r.prev)}</td></tr>`).join('')}</tbody></table></div>`
        : `<div class="empty"><i class="ph ph-monitor"></i> لا توجد منصات معرّفة.</div>`}
    </div>

    <div class="panel">
      <div class="panel-h"><h2><i class="ph-fill ph-bell-ringing"></i> أعضاء يحتاجون متابعة</h2><span class="sub">${idle.length} عضو</span></div>
      ${idle.length ? `<div style="display:flex;flex-direction:column;gap:10px;max-height:360px;overflow-y:auto">${idle.map(x => `
        <div class="pulse-card ${x.st.key === 'dormant' ? 'dormant' : 'idle'}">
          <div class="pc-av">${esc((x.m.name||'؟').charAt(0))}</div>
          <div class="pc-info"><div class="pc-name">${esc(x.m.name)}</div>
            <div class="pc-sub"><span class="status-dot ${x.st.dot}"></span>${x.st.label} · ${esc(x.m.platform)||'—'}</div></div>
          <button class="btn btn-soft btn-sm" onclick="window._cardId='${x.m.id}';goto('card')"><i class="ph ph-eye"></i> البطاقة</button>
        </div>`).join('')}</div>`
        : `<div class="empty"><i class="ph ph-confetti"></i> جميع الأعضاء النشطين متفاعلون. أحسنتم!</div>`}
    </div>
  </div>

  <div class="panel" id="activePulseWrap">
    <div class="panel-h"><h2><i class="ph-fill ph-trophy"></i> الأكثر تفاعلاً مؤخراً</h2><span class="sub">مرتّب حسب نقاط ${periodLabel}</span></div>
    ${activeList.length ? `<div class="grid3">${activeList.slice(0, 9).map(x => `
      <div class="pulse-card active">
        <div class="pc-av">${esc((x.m.name||'؟').charAt(0))}</div>
        <div class="pc-info"><div class="pc-name">${esc(x.m.name)}</div>
          <div class="pc-sub"><span class="status-dot ${x.st.dot}"></span>آخر نشاط: ${x.last ? esc(x.last) : '—'}</div></div>
        <div class="pc-pts"><div class="n">${x.cur}</div><div class="l">نقطة</div></div>
      </div>`).join('')}</div>`
      : `<div class="empty"><i class="ph ph-moon-stars"></i> لا تفاعل مسجّل في هذه الفترة بعد.</div>`}
  </div>`;

  // رسم اتجاه الشبكة
  if(pulseTrendChart) pulseTrendChart.destroy();
  const trend = networkTrend(type, type === "week" ? 8 : 6);
  const ctx = document.getElementById('pulseTrend');
  if(ctx){
    pulseTrendChart = new Chart(ctx, {
      type: 'line',
      data: { labels: trend.map(t => t.label), datasets: [
        { label: 'النقاط', data: trend.map(t => t.points), borderColor: '#238b9e', backgroundColor: 'rgba(35,139,158,0.12)', borderWidth: 3, fill: true, tension: 0.35, pointBackgroundColor: '#d4af37', pointRadius: 4 },
        { label: 'عدد الأنشطة', data: trend.map(t => t.acts), borderColor: '#d16b24', backgroundColor: 'transparent', borderWidth: 2, borderDash: [5,4], tension: 0.35, pointRadius: 3, yAxisID: 'y1' }
      ]},
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { font: { family: 'IBM Plex Sans Arabic' } } } },
        scales: { y: { beginAtZero: true, title: { display: true, text: 'النقاط' } },
          y1: { beginAtZero: true, position: 'left', grid: { drawOnChartArea: false }, title: { display: true, text: 'الأنشطة' } } } }
    });
  }
}

  const ids = window._cmpIds || [state.members[0].id, state.members[1].id];
  const now = new Date(); const y = now.getFullYear(), mo = now.getMonth() + 1;
  const sel = ids.map((sid, i) => `<div class="field" style="width:200px"><label>اختر عضو ${i + 1}</label>
    <select onchange="setCmp(${i},this.value)"><option value="">— لا أحد —</option>
      ${state.members.map(m => `<option value="${m.id}" ${m.id === sid ? 'selected' : ''}>${esc(m.name)}</option>`).join('')}</select></div>`).join('');

  const rowsData = [
    ["المستوى الحالي", m => levelOf(memberTotal(m.id))],
    ["النقاط الكلية", m => memberTotal(m.id)],
    ["نقاط الشهر الحالي", m => memberMonthly(m.id, y, mo)],
    ["عدد الأنشطة المنجزة", m => memberActs(m.id).length],
    ["نقاط: النشاط الرقمي", m => memberByCat(m.id)[CAT.DIG]],
    ["نقاط: المشاركة العلمية", m => memberByCat(m.id)[CAT.SCI]],

    ["نقاط: الالتزام والانضباط", m => memberByCat(m.id)[CAT.LEAD]],
    ["عدد المبادرات", m => initiatives(m.id)],
    ["الدروع الحاصل عليها", m => memberBadges(m.id)]
  ];
  document.getElementById('cmpBody').innerHTML = `
    <div class="toolbar" style="background:transparent; border:none">${sel}${ids.length < 4 ? `<button class="btn btn-soft" style="align-self:flex-end" onclick="addCmp()"><i class="ph-bold ph-plus"></i> إضافة عضو للمقارنة</button>` : ''}</div>

    }).join('')}</tbody></table></div>` : `<div class="empty">اختر عضوين على الأقل.</div>`}`;

    <div class="field"><label>اسم الدرع / تفصيل المكافأة</label><input id="f_title" list="badges" value="${esc(w.title)}"><datalist id="badges">${BADGE_CATALOG.map(b => `<option value="${b}">`).join('')}</datalist></div></div>
   <div class="grid2"><div class="field"><label>تاريخ المنح</label><input type="date" id="f_date" value="${esc(w.date)}"></div>

function buildReport(t){
  let titleSub = t.type==='monthly' ? `التقرير الشهري (${MONTHS[t.m-1]} ${t.y})` : t.type==='weekly' ? `التقرير الأسبوعي (${t.ref})` : `التقرير السنوي الختامي (${t.y})`;
  if(t.plat) titleSub += ` — ${t.plat}`;
  if(t.role) titleSub += ` — ${t.role}`;

  const head = `<div class="report-head"><h2>شبكة الرواد الإلكترونية</h2><h3>لوحة الأثر | ${titleSub}</h3><p>تاريخ استخراج التقرير: ${today()}</p></div>`;
  
  const sc = t.type === 'monthly' ? {type:"month", y:t.y, m:t.m} : t.type === 'weekly' ? {type:"week", ref:t.ref} : {type:"year", y:t.y};
  
  // تصفية الأعضاء بناءً على الفلاتر
  let filteredMembers = state.members;
  if (t.plat) filteredMembers = filteredMembers.filter(m => m.platform === t.plat);
  if (t.role) filteredMembers = filteredMembers.filter(m => m.role === t.role);

  let S = filteredMembers.map(m => ({ ...m, total: t.type==='yearly'?memberYearly(m.id,t.y):scopedPoints(m.id, sc), actsCount: scopedActs(m.id, sc).length })).sort((a,b)=>b.total-a.total);
  
  const totalP = S.reduce((s, m) => s + m.total, 0);
  const activeMembers = S.filter(m => m.total > 0);
  const top10 = activeMembers.slice(0, 10);
  
  // تجميع الأنشطة المنجزة لمعرفة الأكثر شيوعاً
  const allActs = [];
  S.forEach(m => allActs.push(...scopedActs(m.id, sc)));
  const actFreq = {};
  allActs.forEach(a => { actFreq[a.activity] = (actFreq[a.activity] || 0) + (Number(a.count) || 1); });
  const topActivities = Object.entries(actFreq).sort((a, b) => b[1] - a[1]).slice(0, 3);

  // الملخص التنفيذي الذكي
  let summaryText = `خلال هذه الفترة، سجلت الشبكة مجموع <b>${totalP} نقطة</b> بإجمالي <b>${allActs.length} نشاط معتمد</b>. `;
  summaryText += `بلغ عدد الأعضاء المتفاعلين <b>${activeMembers.length}</b> من أصل ${filteredMembers.length} عضو مسجل. `;
  if(top10.length > 0) summaryText += `وقد تصدر الأداء العضو <b>${esc(top10[0].name)}</b> محققاً ${top10[0].total} نقطة. `;
  if(topActivities.length > 0) {
    summaryText += `أما الأنشطة الأكثر تركيزاً فكانت: ${topActivities.map(x => `"${esc(x[0])}"`).join('، ')}.`;
  }

  let html = head + `
    <div class="insight-box">
      <h4><i class="ph-fill ph-lightbulb"></i> الملخص التنفيذي</h4>
      <p>${summaryText}</p>
    </div>

    <div class="kpis" style="margin-bottom:30px">
      <div class="kpi g" style="text-align:center"><div class="label" style="font-size:15px">مجموع النقاط</div><div class="val" style="font-size:32px">${totalP}</div></div>
      <div class="kpi t" style="text-align:center"><div class="label" style="font-size:15px">الأعضاء المتفاعلون</div><div class="val" style="font-size:32px">${activeMembers.length}</div></div>
      <div class="kpi p" style="text-align:center"><div class="label" style="font-size:15px">إجمالي الأنشطة</div><div class="val" style="font-size:32px">${allActs.length}</div></div>
    </div>
    
    <div class="report-section">
      <h3>قائمة الشرف: أعلى الأعضاء أداءً</h3>
      ${top10.length ? `<table><thead><tr><th class="center" style="width:50px">الترتيب</th><th>الاسم</th><th>الصفة</th>${!t.plat ? '<th>المنصة</th>' : ''}<th class="center">الأنشطة</th><th class="center">النقاط</th></tr></thead>
        <tbody>${top10.map((m, i) => `<tr><td class="center"><b>${i + 1}</b></td><td><b>${esc(m.name)}</b></td><td>${esc(m.role)}</td>${!t.plat ? `<td>${esc(m.platform)}</td>` : ''}<td class="center num">${m.actsCount}</td><td class="center num" style="color:var(--navy);font-weight:bold">${m.total}</td></tr>`).join('')}</tbody></table>` : '<p>لا توجد تفاعلات مسجلة لهذه الفترة.</p>'}
    </div>`;

  // إضافة قسم أداء المنصات إذا لم يكن التقرير مخصصاً لمنصة واحدة
  if (!t.plat && activeMembers.length > 0) {
    const plats = platformAgg(sc).filter(p => p.points > 0);
    html += `
    <div class="report-section">
      <h3>أداء المنصات والمشاريع</h3>
      ${plats.length ? `<table><thead><tr><th>المنصة</th><th class="center">الأعضاء المتفاعلون</th><th class="center">الأنشطة</th><th class="center">مجموع النقاط</th><th>الرائد الأول</th></tr></thead>
        <tbody>${plats.map(p => `<tr><td><b>${esc(p.platform)}</b></td><td class="center num">${p.count}</td><td class="center num">${p.acts}</td><td class="center num" style="font-weight:bold">${p.points}</td><td>${esc(p.best)}</td></tr>`).join('')}</tbody></table>` : ''}
    </div>`;
  }

  html += `
    <div style="margin-top:50px; text-align:center; color:var(--muted); font-size:12.5px; border-top:1px solid var(--line); padding-top:20px">
      تم إنشاء هذا التقرير آلياً عبر نظام "لوحة أثر الرواد الإصدار الثالث".<br>جميع البيانات تعكس الأنشطة المعتمدة في النظام حتى تاريخ صدور التقرير.
    </div>`;
    
  return html;
}

function critModal(){
  openModal("إضافة معيار نشاط جديد", `
   <div class="field"><label>اسم النشاط بالتفصيل</label><input id="c_name"></div>
   <div class="grid2"><div class="field"><label class="has-tooltip" data-tooltip="هذه هي القيمة الأساسية التي سيُضرب بها (العدد) لاحقاً لتوليد النقاط النهائية.">القيمة الأساسية (النقاط) <i class="ph-fill ph-question"></i></label><input type="number" id="c_pts" value="10"></div>
    <div class="field"><label class="has-tooltip" data-tooltip="المحور الذي يصب فيه هذا النشاط (رقمي، علمي، إلخ)، يُستخدم في الرسوم البيانية.">التصنيف (المحور) <i class="ph-fill ph-question"></i></label><select id="c_cat">${Object.values(CAT).map(c => `<option>${c}</option>`).join('')}</select></div></div>
   <div class="field"><label>ملاحظات/شروط القبول</label><input id="c_note"></div>`,
  () => {
    const name = val('c_name').trim(); if(!name) { alert("اسم النشاط مطلوب"); return false; }
    state.criteria.activities.push({ name, points: Number(val('c_pts')) || 0, category: val('c_cat'), note: val('c_note') });
    save(); renderCriteria(); return true;
  });
}
function delCrit(i){ if(!confirm("تحذير: حذف هذا المعيار سيؤثر على دقة نقاط الأنشطة المسجلة مسبقاً بهذا الاسم. هل أنت متأكد؟")) return; state.criteria.activities.splice(i, 1); save(); renderCriteria(); }

/* ===== Backup & Demo Data ===== */
function exportJSON(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = "ruwad_backup_" + today() + ".json"; a.click();
}
function importJSON(e){
  const f = e.target.files[0]; if(!f) return; const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result); if(!d.members || !d.criteria) throw 0;
      d.settings = d.settings || defaultSettings(); d.gates = d.gates || {}; d.ui = d.ui || { mode: "إدارة" };
      state = d; save(); applyMode(); goto('dashboard'); alert("تم استرجاع النسخة بنجاح.");
    } catch(x){ alert("ملف النسخة الاحتياطية غير صالح أو تالف."); }
  }; r.readAsText(f); e.target.value = "";
}
function resetAll(){ if(!confirm("تنبيه: سيتم مسح كافة البيانات المسجلة! خذ نسخة احتياطية أولاً. متابعة؟")) return; state = blankState(); save(); applyMode(); goto('dashboard'); }
